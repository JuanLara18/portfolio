    <!-- SPA routing on GitHub Pages: decode the ?/path encoded by 404.html so
         the browser URL matches what the user originally requested before React
         Router boots. Must run before the bundle loads. -->
    <script>
      (function (l) {
        // Legacy HashRouter URLs (#/blog/...) — rewrite to clean paths.
        if (l.hash && l.hash.indexOf('#/') === 0) {
          var clean = l.hash.slice(1);
          var base = l.pathname.replace(/\/$/, '');
          window.history.replaceState(null, '', base + clean + l.search);
        }
        // 404.html redirect decoder (rafgraph/spa-github-pages technique).
        if (l.search && l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
